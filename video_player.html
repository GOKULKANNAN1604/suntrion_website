<!DOCTYPE html>
<html lang="en">
<head>
  <title>Video Viewer</title>
  <style>
    body { font-family: sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; }
    .video-container { margin: 20px; display: flex; flex-direction: column; align-items: center; }
    video { width: 600px; border: 2px solid #444; }
  </style>
</head>
<body>
  <h1>Video Reference Player</h1>
  
  <div class="video-container">
    <h2>1. stitching.mp4</h2>
    <video src="/stitching.mp4" controls loop></video>
  </div>
  
  <div class="video-container">
    <h2>2. IV MIP.mp4</h2>
    <video src="/IV MIP.mp4" controls loop></video>
  </div>
  
  <div class="video-container">
    <h2>3. IV Maes.mp4</h2>
    <video src="/IV Maes.mp4" controls loop></video>
  </div>
  
  <script>
    document.querySelectorAll('video').forEach(vid => {
      vid.playbackRate = 2.0;
    });
  </script>
</body>
</html>
